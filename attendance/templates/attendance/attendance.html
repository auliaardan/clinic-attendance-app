<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Absensi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body{background:#f4f6f9}.app-container{max-width:480px;margin:auto;padding:12px}.card{border-radius:16px;box-shadow:0 4px 12px rgba(0,0,0,.06)}
    #qrVideo,#selfiePreview{width:100%;max-height:420px;object-fit:cover;border-radius:12px;background:#111}.status-small{font-size:13px;color:#666}#result{margin-top:10px;font-weight:500}
  </style>
</head>
<body>
<div class="app-container">
  <div class="text-center mb-3"><h3 class="fw-bold mb-0">Absensi</h3><div class="text-muted small">Scan QR • Selfie • PIN</div></div>

  <div class="card p-3 mb-3">
    <div class="d-flex align-items-center justify-content-between">
      <div><div class="small text-muted mb-1">Status Staff</div><div class="fw-semibold" id="staffStatusText">Pilih staff…</div><div class="status-small" id="staffStatusSince"></div></div>
      <span class="badge text-bg-secondary" id="staffStatusBadge">-</span>
    </div>
    <div class="status-small mt-2" id="actionLabel">Next action: -</div>
  </div>

  <div class="card p-3 mb-3">
    <h6 class="fw-bold mb-2">1) Scan QR</h6>
    <div class="alert alert-info py-2 small">Arahkan kamera ke QR di layar. Scanner bekerja langsung di Android dan iPhone.</div>
    <video id="qrVideo" autoplay playsinline muted></video>
    <canvas id="qrCanvas" class="d-none"></canvas>
    <div class="status-small mt-2">Status: <span id="qrStatus">Menunggu kamera…</span></div>
    <div class="status-small">Expires: <span id="qrCountdown">-</span></div>
    <button class="btn btn-sm btn-secondary mt-2" type="button" id="rescanBtn">Rescan QR</button>
  </div>

  <div class="card p-3 mb-3">
    <h6 class="fw-bold mb-3">2) Isi Data</h6>
    <div class="mb-2"><label class="form-label">Mode</label><select id="mode" class="form-select"><option value="normal">Normal</option><option value="proxy">Clock untuk orang lain (Proxy)</option></select></div>
    <div class="mb-2"><label class="form-label">Nama Staff</label><select id="subject_employee_id" class="form-select">{% for e in employees %}<option value="{{ e.id }}">{{ e.name }}</option>{% endfor %}</select></div>
    <div class="mb-3"><label class="form-label">PIN Staff</label><input id="subject_pin" class="form-control" type="password" inputmode="numeric" placeholder="PIN"/></div>

    <div id="proxyBox" class="d-none">
      <div class="mb-2"><label class="form-label">Saksi</label><select id="witness_employee_id" class="form-select">{% for e in employees %}<option value="{{ e.id }}">{{ e.name }}</option>{% endfor %}</select></div>
      <div class="mb-3"><label class="form-label">PIN Saksi</label><input id="witness_pin" class="form-control" type="password" inputmode="numeric" placeholder="PIN saksi"/></div>
    </div>

    <div class="mb-3">
      <label class="form-label">Selfie</label>
      <div class="alert alert-info py-2 small">Setelah QR valid, kamera scanner berhenti. Tekan tombol kamera untuk mengambil selfie.</div>
      <input id="photo" class="form-control" type="file" accept="image/*" capture="user" disabled/>
      <img id="selfiePreview" class="d-none mt-2" alt="Preview selfie"/>
      <button id="retakeBtn" class="btn btn-outline-secondary btn-sm mt-2 d-none" type="button">Ambil Ulang</button>
    </div>

    <button id="submitBtn" class="btn btn-success w-100" type="button" disabled>Submit Absensi</button>
    <div id="result" class="text-center"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<script>
let currentAction="IN",scannedToken="",expiresIn=0,countdownTimer=null;
let qrStream=null,scanFrame=null,detector=null,selfieFile=null,lastDecodeAt=0;
const qrVideo=document.getElementById("qrVideo"),qrCanvas=document.getElementById("qrCanvas"),qrStatus=document.getElementById("qrStatus"),qrCountdown=document.getElementById("qrCountdown");
const photoInput=document.getElementById("photo"),preview=document.getElementById("selfiePreview"),submitBtn=document.getElementById("submitBtn"),result=document.getElementById("result");

function setResult(message){result.textContent=message||""}
function setAction(action){currentAction=action;document.getElementById("actionLabel").textContent=`Next action: ${action}`;submitBtn.classList.toggle("btn-danger",action==="OUT");submitBtn.classList.toggle("btn-success",action!=="OUT")}
function updateSubmitState(){submitBtn.disabled=!(scannedToken&&selfieFile&&document.getElementById("subject_pin").value)}
function stopCountdown(){if(countdownTimer)clearInterval(countdownTimer);countdownTimer=null}
function startCountdown(seconds){stopCountdown();expiresIn=Number(seconds||0);qrCountdown.textContent=`${expiresIn}s`;countdownTimer=setInterval(()=>{expiresIn=Math.max(0,expiresIn-1);qrCountdown.textContent=`${expiresIn}s`;if(!expiresIn){scannedToken="";photoInput.disabled=true;updateSubmitState();stopCountdown();qrStatus.textContent="QR kedaluwarsa — scan ulang";startQrScanner()}},1000)}
async function stopQrScanner(){if(scanFrame)cancelAnimationFrame(scanFrame);scanFrame=null;if(qrStream){qrStream.getTracks().forEach(track=>track.stop());qrStream=null}qrVideo.srcObject=null}
async function validateToken(token){const response=await fetch(`/api/qr/check/?token=${encodeURIComponent(token)}`,{cache:"no-store"});if(!response.ok)throw new Error("QR check failed");return response.json()}
function extractToken(rawValue){const raw=(rawValue||"").trim();if(!raw)return "";try{const url=new URL(raw,window.location.origin);if(url.origin===window.location.origin&&url.pathname==="/attendance/")return (url.searchParams.get("qr")||"").trim()}catch(error){}return raw}
async function acceptToken(rawValue){const token=extractToken(rawValue);await stopQrScanner();qrStatus.textContent="Memeriksa QR…";try{const check=await validateToken(token);if(!check.valid)throw new Error("invalid");scannedToken=token;qrStatus.textContent="QR valid — ambil selfie";photoInput.disabled=false;startCountdown(check.expires_in);updateSubmitState();if(history.replaceState)history.replaceState({},document.title,"/attendance/")}catch(error){scannedToken="";photoInput.disabled=true;qrStatus.textContent="QR tidak valid — scan ulang";startQrScanner()}}

async function scanWithNativeDetector(){const codes=await detector.detect(qrVideo);return codes.length&&codes[0].rawValue?codes[0].rawValue:""}
function scanWithJsQr(){if(typeof jsQR!=="function"||qrVideo.readyState<2)return "";const width=qrVideo.videoWidth,height=qrVideo.videoHeight;if(!width||!height)return "";qrCanvas.width=width;qrCanvas.height=height;const ctx=qrCanvas.getContext("2d",{willReadFrequently:true});ctx.drawImage(qrVideo,0,0,width,height);const image=ctx.getImageData(0,0,width,height);const code=jsQR(image.data,width,height,{inversionAttempts:"attemptBoth"});return code&&code.data?code.data:""}
async function scanLoop(timestamp){if(!qrStream)return;if(timestamp-lastDecodeAt>180){lastDecodeAt=timestamp;try{const value=detector?await scanWithNativeDetector():scanWithJsQr();if(value){await acceptToken(value);return}}catch(error){}}scanFrame=requestAnimationFrame(scanLoop)}
async function startQrScanner(){await stopQrScanner();scannedToken="";photoInput.disabled=true;updateSubmitState();if(!window.isSecureContext){qrStatus.textContent="Kamera memerlukan HTTPS";return}try{detector=("BarcodeDetector" in window)?new BarcodeDetector({formats:["qr_code"]}):null;if(!detector&&typeof jsQR!=="function"){qrStatus.textContent="Decoder QR gagal dimuat. Periksa koneksi lalu muat ulang.";return}qrStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:"environment"},width:{ideal:1280},height:{ideal:720}},audio:false});qrVideo.srcObject=qrStream;await qrVideo.play();qrStatus.textContent="Arahkan kamera ke QR";scanFrame=requestAnimationFrame(scanLoop)}catch(error){qrStatus.textContent="Kamera QR gagal. Izinkan kamera lalu tekan Rescan."}}

async function isMostlyBlack(file){const image=await createImageBitmap(file);const canvas=document.createElement("canvas"),max=96,scale=Math.min(1,max/Math.max(image.width,image.height));canvas.width=Math.max(1,Math.round(image.width*scale));canvas.height=Math.max(1,Math.round(image.height*scale));const ctx=canvas.getContext("2d");ctx.drawImage(image,0,0,canvas.width,canvas.height);image.close();const data=ctx.getImageData(0,0,canvas.width,canvas.height).data;let total=0;for(let i=0;i<data.length;i+=4)total+=(data[i]+data[i+1]+data[i+2])/3;return total/(data.length/4)<12}
photoInput.addEventListener("change",async()=>{const file=photoInput.files[0];selfieFile=null;preview.classList.add("d-none");if(!file){updateSubmitState();return}try{if(await isMostlyBlack(file)){photoInput.value="";setResult("❌ Foto terlihat hitam/kosong. Ambil ulang.");updateSubmitState();return}selfieFile=file;preview.src=URL.createObjectURL(file);preview.classList.remove("d-none");document.getElementById("retakeBtn").classList.remove("d-none");setResult("✅ Selfie siap dikirim.");updateSubmitState()}catch(error){photoInput.value="";setResult("❌ Foto tidak dapat dibaca. Ambil ulang.")}})
document.getElementById("retakeBtn").addEventListener("click",()=>{photoInput.value="";selfieFile=null;preview.removeAttribute("src");preview.classList.add("d-none");document.getElementById("retakeBtn").classList.add("d-none");setResult("");updateSubmitState();photoInput.click()})
document.getElementById("rescanBtn").addEventListener("click",()=>{stopCountdown();startQrScanner()})
document.getElementById("mode").addEventListener("change",event=>document.getElementById("proxyBox").classList.toggle("d-none",event.target.value!=="proxy"))
document.getElementById("subject_pin").addEventListener("input",updateSubmitState)
document.getElementById("subject_employee_id").addEventListener("change",refreshStatus)

async function refreshStatus(){const id=document.getElementById("subject_employee_id").value;try{const response=await fetch(`/api/employee/status/?employee_id=${encodeURIComponent(id)}`,{cache:"no-store"});const data=await response.json();if(!data.ok)throw new Error();document.getElementById("staffStatusText").textContent=`${data.employee_name} • ${data.current_state==="IN"?"Sudah Clock In":"Belum Clock In"}`;document.getElementById("staffStatusBadge").textContent=data.current_state==="IN"?"SEDANG BEKERJA":"BELUM CLOCK IN";document.getElementById("staffStatusBadge").className=`badge ${data.current_state==="IN"?"text-bg-success":"text-bg-secondary"}`;document.getElementById("staffStatusSince").textContent=data.since?`Sejak: ${new Date(data.since).toLocaleString()}`:"";setAction(data.next_action)}catch(error){document.getElementById("staffStatusText").textContent="Gagal mengambil status"}}
submitBtn.addEventListener("click",async()=>{const isProxy=document.getElementById("mode").value==="proxy",subjectPin=document.getElementById("subject_pin").value;if(!scannedToken)return setResult("❌ Scan QR dulu.");if(!subjectPin)return setResult("❌ PIN staff wajib.");if(!selfieFile)return setResult("❌ Ambil selfie dulu.");if(isProxy&&!document.getElementById("witness_pin").value)return setResult("❌ PIN saksi wajib.");submitBtn.disabled=true;const form=new FormData();form.append("action",currentAction);form.append("qr_token",scannedToken);form.append("subject_employee_id",document.getElementById("subject_employee_id").value);form.append("subject_pin",subjectPin);form.append("photo",selfieFile,"selfie.jpg");form.append("is_proxy",isProxy?"1":"0");if(isProxy){form.append("witness_employee_id",document.getElementById("witness_employee_id").value);form.append("witness_pin",document.getElementById("witness_pin").value)}try{const response=await fetch("/api/clock/",{method:"POST",body:form});const data=await response.json();if(!data.ok)throw new Error(data.error||"Error");setResult(`✅ ${data.message}`);photoInput.value="";selfieFile=null;preview.classList.add("d-none");document.getElementById("subject_pin").value="";scannedToken="";stopCountdown();await refreshStatus();await startQrScanner()}catch(error){setResult(`❌ ${error.message}`);updateSubmitState()}})
window.addEventListener("load",()=>{refreshStatus();const token=new URLSearchParams(location.search).get("qr");if(token)acceptToken(token);else startQrScanner()})
window.addEventListener("beforeunload",()=>{stopCountdown();stopQrScanner()})
</script>
</body>
</html>
